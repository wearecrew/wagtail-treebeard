name: Test

on:
  push:
    branches:
      - main
      - "stable/**"
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: "1"
  TOX_TESTENV_PASSENV: FORCE_COLOR
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PYTHON_LATEST: "3.12"

jobs:
  test:
    name: Python ${{ matrix.python }} ${{ matrix.label }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.11"
            label: ""
            toxenv: ""
            experimental: false
          - python: "3.12"
            label: ""
            toxenv: ""
            experimental: false
          - python: "3.13"
            label: ""
            toxenv: ""
            experimental: false
          - python: "3.14"
            label: ""
            toxenv: ""
            experimental: false
          - python: "3.13"
            label: "(wagtailmain)"
            toxenv: wagtailmain
            experimental: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: python -Im pip install --upgrade pip flit tox tox-gh-actions

      - name: Build wheel
        run: python -Im flit build --format wheel

      - name: Run tox
        env:
          TOXENV: ${{ matrix.toxenv }}
        run: |
          if [ -n "$TOXENV" ]; then
            tox -e "$TOXENV"
          else
            tox run -f "py$(echo '${{ matrix.python }}' | tr -d .)" --installpkg ./dist/*.whl
          fi

      - name: Upload coverage data
        if: ${{ matrix.experimental == false }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.python }}${{ matrix.toxenv }}
          path: .coverage.*
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

  coverage:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() && needs.test.result != 'cancelled' && needs.test.result != 'skipped' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_LATEST }}

      - run: python -Im pip install --upgrade coverage

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage
        run: |
          python -Im coverage combine
          python -Im coverage html --skip-covered --skip-empty
          python -Im coverage report
          echo "## Coverage summary" >> $GITHUB_STEP_SUMMARY
          python -Im coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: htmlcov
