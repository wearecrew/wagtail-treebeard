{% load i18n %}
<nav class="listing-filter" aria-label="{% trans 'Tree location' %}">
    <p class="w-help-text">
        <a href="{{ browse_results_url }}" class="treebeard-snippet-chooser-navigate" data-parent-pk="">{% trans "Root" %}</a>
        {% for link in browse_ancestor_links %}
            <span aria-hidden="true"> › </span>
            <a href="{{ link.url }}" class="treebeard-snippet-chooser-navigate" data-parent-pk="{{ link.pk }}">{{ link.label }}</a>
        {% endfor %}
        {% if browse_parent %}
            <span aria-hidden="true"> › </span>
            <strong>{{ browse_parent }}</strong>
        {% endif %}
    </p>
</nav>
{% if can_choose_root and not browse_parent %}
    <p>
        <button type="button" class="button button-small button-secondary treebeard-snippet-chooser-clear-parent">
            {% trans "Create as root (no parent)" %}
        </button>
    </p>
{% endif %}
