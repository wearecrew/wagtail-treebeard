[tox]
min_version = 4.11

envlist =
    py{3.11,3.12,3.13}-django{4.2,5.0,5.2}-wagtail7.4-{sqlite,postgres}
    py{3.12,3.13}-django6.0-wagtail7.4-{sqlite,postgres}
    py3.14-django6.0-wagtail7.4-sqlite

[gh-actions]
python =
    3.11: py3.11
    3.12: py3.12
    3.13: py3.13
    3.14: py3.14

[gh-actions:env]
DB =
    sqlite: sqlite
    postgres: postgres

[testenv]
package = wheel
wheel_build_env = .pkg
use_frozen_constraints = true
constrain_package_deps = true

pass_env =
    FORCE_COLOR
    NO_COLOR
    DATABASE_URL

setenv =
    PYTHONPATH = {toxinidir}/tests:{toxinidir}
    PYTHONDEVMODE = 1

extras = testing

deps =
    django4.2: Django>=4.2,<4.3
    django5.0: Django>=5.0,<5.1
    django5.2: Django>=5.2,<5.3
    django6.0: Django>=6.0,<6.1
    wagtail7.4: wagtail>=7.4,<7.5
    postgres: psycopg2>=2.9

install_command = python -Im pip install -U --pre {opts} {packages}
commands_pre =
    python -I {toxinidir}/tests/manage.py migrate --run-syncdb
commands =
    python -m coverage run {toxinidir}/tests/manage.py test --deprecation all {posargs: -v 2}

[testenv:coverage-report]
base_python = python3.12
package = skip
deps =
    coverage>=7.0,<8.0
commands =
    python -Im coverage combine
    python -Im coverage report -m

[testenv:interactive]
description = Interactive Django shell and runserver for local exploration
basepython = python3.12
extras = testing
deps =
    django5.2: Django>=5.2,<5.3
    wagtail7.4: wagtail>=7.4,<7.5
commands_pre =
    python {toxinidir}/tests/manage.py migrate --run-syncdb
    python {toxinidir}/tests/manage.py shell -c "from django.contrib.auth.models import User; (not User.objects.filter(username='admin').exists()) and User.objects.create_superuser('admin', 'super@example.com', 'changeme')"
commands =
    {posargs:python -Im {toxinidir}/tests/manage.py runserver 0.0.0.0:8020}
