[tox]
min_version = 4.11

envlist =
    py{3.12,3.13}-django4.2-wagtail70
    py{3.12,3.13}-django5.2-wagtail{70,74}
    py{3.12,3.13,3.14}-django6.0-wagtail74
    wagtailmain

[gh-actions]
python =
    3.12: py3.12
    3.13: py3.13
    3.14: py3.14

[testenv]
package = wheel
wheel_build_env = .pkg
use_frozen_constraints = true
constrain_package_deps = true

pass_env =
    FORCE_COLOR
    NO_COLOR

setenv =
    PYTHONPATH = {toxinidir}/tests:{toxinidir}
    PYTHONDEVMODE = 1
    COVERAGE_FILE = .coverage.{envname}

extras = testing

deps =
    django4.2: Django>=4.2,<4.3
    django5.2: Django>=5.2,<5.3
    django6.0: Django>=6.0,<6.1
    wagtail70: wagtail>=7.0,<7.1
    wagtail74: wagtail>=7.4,<7.5

install_command = python -Im pip install -U --pre {opts} {packages}
commands_pre =
    python -I {toxinidir}/tests/manage.py migrate --run-syncdb
commands =
    python -m coverage run {toxinidir}/tests/manage.py test --deprecation all {posargs: -v 2}

[testenv:wagtailmain]
description = Wagtail main branch (allowed to fail in PR CI; required on nightly)
# Install from src/ so pip is not asked to satisfy Wagtail<8 and main at once.
package = skip
deps =
    Django>=6.0,<6.1
    django-treebeard>=4.7
    coverage>=7.0,<8.0
    dj-database-url>=2.1.0,<3.0
    https://github.com/wagtail/wagtail/archive/refs/heads/main.zip
setenv =
    PYTHONPATH = {toxinidir}/src:{toxinidir}/tests:{toxinidir}
    PYTHONDEVMODE = 1
    COVERAGE_FILE = .coverage.{envname}
commands_pre =
    python {toxinidir}/tests/manage.py migrate --run-syncdb
commands =
    python -m coverage run {toxinidir}/tests/manage.py test --deprecation all {posargs: -v 2}

[testenv:coverage-report]
base_python = python3.12
package = skip
deps =
    coverage>=7.0,<8.0
commands =
    python -Im coverage combine
    python -Im coverage report -m

[testenv:interactive]
description = Interactive Django shell and runserver for local exploration
basepython = python3.12
extras = testing
deps =
    django5.2: Django>=5.2,<5.3
    wagtail74: wagtail>=7.4,<7.5
commands_pre =
    python {toxinidir}/tests/manage.py migrate --run-syncdb
    python {toxinidir}/tests/manage.py shell -c "from django.contrib.auth.models import User; (not User.objects.filter(username='admin').exists()) and User.objects.create_superuser('admin', 'super@example.com', 'changeme')"
commands =
    {posargs:python -Im {toxinidir}/tests/manage.py runserver 0.0.0.0:8020}
